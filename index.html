<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金日报</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 16px;
            max-width: 420px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .title { font-size: 20px; font-weight: 600; }
        .refresh { font-size: 12px; color: #58a6ff; cursor: pointer; }
        .card {
            background: #161b22;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rank {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 11px;
        }
        .rank.up { background: #238636; color: white; }
        .rank.down { background: #da3633; color: white; }
        .info { flex: 1; }
        .name { font-size: 14px; font-weight: 500; }
        .code { font-size: 11px; color: #8b949e; }
        .nav { font-size: 16px; font-weight: 600; }
        .change {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            min-width: 60px;
            text-align: center;
        }
        .change.up { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .change.down { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .change.neu { background: #21262d; color: #8b949e; }
        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat {
            background: #161b22;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-val { font-size: 24px; font-weight: 600; margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: #8b949e; }
        .up .stat-val { color: #3fb950; }
        .down .stat-val { color: #f85149; }
        .total-gain {
            text-align: center;
            margin-bottom: 16px;
            padding: 16px;
            background: #161b22;
            border-radius: 10px;
        }
        .total-gain-val { font-size: 32px; font-weight: 700; }
        .total-gain-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
        .total-gain.up .total-gain-val { color: #3fb950; }
        .total-gain.down .total-gain-val { color: #f85149; }
        .total-gain.neu .total-gain-val { color: #c9d1d9; }
        
        .leader { display: flex; gap: 8px; margin-bottom: 16px; }
        .leader-card {
            flex: 1;
            background: #161b22;
            border-radius: 10px;
            padding: 12px;
        }
        .leader-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
        .leader-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .leader-change { font-size: 18px; font-weight: 600; }
        .leader-change.up { color: #3fb950; }
        .leader-change.down { color: #f85149; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .fund-gain { font-size: 12px; font-weight: 600; margin-top: 4px; }
        .fund-gain.up { color: #3fb950; }
        .fund-gain.down { color: #f85149; }
        .share-edit {
            margin-left: 8px;
            font-size: 12px;
            color: #58a6ff;
            cursor: pointer;
            padding: 4px 8px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 6px;
        }

        .time { 
            text-align: center; 
            color: #8b949e; 
            font-size: 11px; 
            margin-top: 16px; 
            padding: 8px;
            background: #161b22;
            border-radius: 8px;
        }
        .live { display: inline-block; width: 8px; height: 8px; background: #3fb950; border-radius: 50%; margin-right: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📊 基金日报 <span class="live"></span></div>
        <div class="actions">
            <span class="refresh" onclick="refreshData()">刷新</span>
            <span class="settings" onclick="toggleManageMode()">⚙️</span>
        </div>
    </div>
    
    <div id="add-fund-area" style="display: none; margin-bottom: 16px;">
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <input type="text" id="new-fund-code" placeholder="输入基金代码 (如 002910)" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9;">
            <button onclick="addFund()" style="padding: 8px 16px; border-radius: 6px; border: none; background: #238636; color: white; font-weight: 600; cursor: pointer;">添加</button>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="exportConfig()" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #58a6ff; cursor: pointer;">导出配置</button>
            <button onclick="importConfig()" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #58a6ff; cursor: pointer;">导入配置</button>
        </div>
    </div>
    
    <div id="content">
        <div class="loading">加载中...</div>
    </div>
    
    <div class="time" id="updateTime"></div>
    
    <script>
        const API_BASE = 'https://fundgz.1234567.com.cn/js';
        
        const DEFAULT_FUNDS = [
            { code: '159361', name: '易方达中证A500ETF', share: 0 },
            { code: '470888', name: '汇添富香港优势精选A', share: 0 },
            { code: '021268', name: '长城医药产业精选A', share: 0 },
            { code: '510330', name: '华夏沪深300ETF', share: 0 },
            { code: '005827', name: '易方达蓝筹精选', share: 0 }
        ];

        let FUNDS = JSON.parse(localStorage.getItem('my_funds')) || DEFAULT_FUNDS;
        // Migrate old data (add share field if missing)
        FUNDS = FUNDS.map(f => ({ share: 0, ...f }));
        
        let isManageMode = false;

        const pendingRequests = {};
        window.jsonpgz = function(data) {
            const code = data.fundcode;
            if (pendingRequests[code]) {
                pendingRequests[code].resolve(data);
                delete pendingRequests[code];
            }
        };
        
        function fetchFund(code) {
            return new Promise((resolve, reject) => {
                pendingRequests[code] = { resolve, reject };
                const script = document.createElement('script');
                script.src = `${API_BASE}/${code}.js?rt=${Date.now()}`;
                script.onload = () => {
                    script.remove();
                };
                script.onerror = () => {
                    delete pendingRequests[code];
                    script.remove();
                    resolve(null);
                };
                document.body.appendChild(script);
                
                setTimeout(() => {
                    if (pendingRequests[code]) {
                        delete pendingRequests[code];
                        resolve(null);
                    }
                }, 3000);
            });
        }
        
        function saveFunds() {
            localStorage.setItem('my_funds', JSON.stringify(FUNDS));
        }

        function toggleManageMode() {
            isManageMode = !isManageMode;
            document.getElementById('add-fund-area').style.display = isManageMode ? 'block' : 'none';
            refreshData(); 
        }

        async function addFund() {
            const input = document.getElementById('new-fund-code');
            const code = input.value.trim();
            if (!code) return;
            
            if (FUNDS.some(f => f.code === code)) {
                alert('该基金已存在');
                input.value = '';
                return;
            }

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '查询中...';
            btn.disabled = true;

            const data = await fetchFund(code);
            if (data) {
                FUNDS.push({ code: code, name: data.name, share: 0 });
                saveFunds();
                input.value = '';
                refreshData();
            } else {
                alert('未找到该基金，请检查代码');
            }
            
            btn.innerText = originalText;
            btn.disabled = false;
        }

        function removeFund(code) {
            if (confirm('确定要删除这个基金吗？')) {
                FUNDS = FUNDS.filter(f => f.code !== code);
                saveFunds();
                refreshData();
            }
        }

        function editShare(code) {
            const fund = FUNDS.find(f => f.code === code);
            if (!fund) return;
            
            const newShare = prompt(`请输入 ${fund.name} (${code}) 的持有份额:`, fund.share || 0);
            if (newShare !== null) {
                const shareNum = parseFloat(newShare);
                if (!isNaN(shareNum) && shareNum >= 0) {
                    fund.share = shareNum;
                    saveFunds();
                    refreshData();
                } else {
                    alert('请输入有效的数字');
                }
            }
        }

        function copyToClipboard(text) {
            // 1. Try modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text).catch(err => {
                    console.error('Clipboard API failed:', err);
                    return fallbackCopy(text);
                });
            } else {
                return fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            return new Promise((resolve, reject) => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    
                    // Ensure element is not visible but part of DOM
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    
                    textArea.focus();
                    textArea.select();
                    
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error("execCommand failed"));
                    }
                } catch (err) {
                    reject(err);
                }
            });
        }

        function exportConfig() {
            const configStr = JSON.stringify(FUNDS);
            const base64Config = btoa(encodeURIComponent(configStr));
            
            copyToClipboard(base64Config).then(() => {
                alert('配置代码已复制到剪贴板！\n请保存好这段代码，在其他设备点击“导入配置”即可恢复。');
            }).catch(err => {
                console.error('Copy failed:', err);
                // Last resort fallback: prompt user to copy manually
                prompt('自动复制失败，请手动复制以下配置代码：', base64Config);
            });
        }

        function importConfig() {
            const base64Config = prompt('请粘贴配置代码：');
            if (!base64Config) return;

            try {
                const configStr = decodeURIComponent(atob(base64Config));
                const newFunds = JSON.parse(configStr);
                
                if (Array.isArray(newFunds)) {
                    if (confirm(`检测到 ${newFunds.length} 个基金配置，确定要覆盖当前配置吗？`)) {
                        FUNDS = newFunds;
                        saveFunds();
                        refreshData();
                        alert('导入成功！');
                    }
                } else {
                    alert('配置代码格式错误');
                }
            } catch (e) {
                alert('无效的配置代码');
            }
        }

        async function refreshData() {
            const content = document.getElementById('content');
            if (FUNDS.length === 0) {
                content.innerHTML = '<div class="loading">暂无关注基金，请点击右上角设置添加</div>';
                document.getElementById('updateTime').innerHTML = '';
                return;
            }
            
            if (!content.querySelector('.card')) {
                content.innerHTML = '<div class="loading">加载中...</div>';
            }
            
            const promises = FUNDS.map(async fund => {
                const data = await fetchFund(fund.code);
                if (data) {
                    const nav = parseFloat(data.gsz || data.dwjz);
                    const lastNav = parseFloat(data.dwjz || 0);
                    const change = parseFloat(data.gszzl || 0);
                    // Calculate estimated profit: (Est. NAV - Yesterday NAV) * Share
                    // Or more simply: Yesterday NAV * Share * Change% / 100
                    // Method 1 (Direct NAV diff): (nav - lastNav) * (fund.share || 0)
                    // Method 2 (Percentage): (lastNav * (fund.share || 0)) * (change / 100)
                    // Method 1 is more accurate to the displayed change amount per share
                    const profit = (nav - lastNav) * (fund.share || 0);
                    
                    return { ...fund, nav, change, profit };
                }
                return { ...fund, nav: 0, change: 0, profit: 0 }; 
            });

            const results = await Promise.all(promises);
            
            results.sort((a, b) => b.change - a.change);
            
            const gains = results.filter(r => r.change > 0);
            const losses = results.filter(r => r.change < 0);
            const totalProfit = results.reduce((sum, r) => sum + r.profit, 0);
            
            const now = new Date();
            document.getElementById('updateTime').innerHTML = `<span class="live"></span>最后更新: ${now.toLocaleTimeString()}`;
            
            let html = '';
            
            // Total Profit Display
            const totalClass = totalProfit > 0 ? 'up' : totalProfit < 0 ? 'down' : 'neu';
            const totalSign = totalProfit > 0 ? '+' : '';
            if (Math.abs(totalProfit) > 0.01) {
                html += `<div class="total-gain ${totalClass}">
                    <div class="total-gain-val">${totalSign}${totalProfit.toFixed(2)}</div>
                    <div class="total-gain-label">今日预估总收益 (元)</div>
                </div>`;
            }

            html += `<div class="summary">
                <div class="stat up"><div class="stat-val">${gains.length}</div><div class="stat-label">上涨</div></div>
                <div class="stat down"><div class="stat-val">${losses.length}</div><div class="stat-label">下跌</div></div>
            </div>`;
            
            if (gains.length > 0 || losses.length > 0) {
                html += `<div class="leader">`;
                if (gains.length > 0) {
                    const top = gains[0];
                    html += `<div class="leader-card">
                        <div class="leader-label">▲ 领涨</div>
                        <div class="leader-name">${top.name}</div>
                        <div class="leader-change up">+${top.change.toFixed(2)}%</div>
                    </div>`;
                }
                if (losses.length > 0) {
                    const worst = losses[losses.length - 1];
                    html += `<div class="leader-card">
                            <div class="leader-label">▼ 领跌</div>
                            <div class="leader-name">${worst.name}</div>
                            <div class="leader-change down">${worst.change.toFixed(2)}%</div>
                        </div>`;
                }
                html += `</div>`;
            }
            
            results.forEach((r, i) => {
                const rankClass = r.change > 0 ? 'up' : r.change < 0 ? 'down' : 'neu';
                const changeClass = r.change > 0 ? 'up' : r.change < 0 ? 'down' : 'neu';
                const changeSign = r.change > 0 ? '+' : '';
                
                let actionBtn = '';
                if (isManageMode) {
                     actionBtn = `
                        <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                            <div class="share-edit" onclick="editShare('${r.code}')">持仓: ${r.share || 0}</div>
                            <div class="delete-btn" onclick="removeFund('${r.code}')" style="color: #f85149; cursor: pointer; padding: 4px; font-size: 12px;">删除</div>
                        </div>`;
                }

                const profitHtml = (r.share > 0) 
                    ? `<div class="fund-gain ${r.profit > 0 ? 'up' : r.profit < 0 ? 'down' : ''}">${r.profit > 0 ? '+' : ''}${r.profit.toFixed(2)}</div>`
                    : '';

                html += `<div class="card">
                    <div class="rank ${rankClass}">${i+1}</div>
                    <div class="info">
                        <div class="name">${r.name}</div>
                        <div class="code">${r.code}</div>
                        ${profitHtml}
                    </div>
                    <div class="nav">${r.nav.toFixed(3)}</div>
                    <div class="change ${changeClass}">${changeSign}${r.change.toFixed(2)}%</div>
                    ${actionBtn}
                </div>`;
            });
            
            content.innerHTML = html;
        }
        
        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
