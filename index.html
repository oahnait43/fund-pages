<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金日报</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 16px;
            max-width: 420px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .title { font-size: 20px; font-weight: 600; }
        .refresh { font-size: 12px; color: #58a6ff; cursor: pointer; }
        .card {
            background: #161b22;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rank {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 11px;
        }
        .rank.up { background: #238636; color: white; }
        .rank.down { background: #da3633; color: white; }
        .info { flex: 1; min-width: 0; }
        .name { font-size: 14px; font-weight: 500; overflow-wrap: anywhere; }
        .code { font-size: 11px; color: #8b949e; overflow-wrap: anywhere; }
        .estimate-meta { font-size: 10px; color: #8b949e; margin-top: 3px; line-height: 1.35; }
        .estimate-meta .quality { color: #d29922; }
        .nav { font-size: 16px; font-weight: 600; }
        .change {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            min-width: 60px;
            text-align: center;
        }
        .change.up { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .change.down { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .change.neu { background: #21262d; color: #8b949e; }
        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat {
            background: #161b22;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-val { font-size: 24px; font-weight: 600; margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: #8b949e; }
        .up .stat-val { color: #3fb950; }
        .down .stat-val { color: #f85149; }
        .total-gain {
            text-align: center;
            margin-bottom: 16px;
            padding: 16px;
            background: #161b22;
            border-radius: 10px;
        }
        .total-gain-val { font-size: 32px; font-weight: 700; }
        .total-gain-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
        .total-gain.up .total-gain-val { color: #3fb950; }
        .total-gain.down .total-gain-val { color: #f85149; }
        .total-gain.neu .total-gain-val { color: #c9d1d9; }
        
        .leader { display: flex; gap: 8px; margin-bottom: 16px; }
        .leader-card {
            flex: 1;
            background: #161b22;
            border-radius: 10px;
            padding: 12px;
        }
        .leader-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
        .leader-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .leader-change { font-size: 18px; font-weight: 600; }
        .leader-change.up { color: #3fb950; }
        .leader-change.down { color: #f85149; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .fund-gain { font-size: 12px; font-weight: 600; margin-top: 4px; }
        .fund-gain.up { color: #3fb950; }
        .fund-gain.down { color: #f85149; }
        .share-edit {
            margin-left: 8px;
            font-size: 12px;
            color: #58a6ff;
            cursor: pointer;
            padding: 4px 8px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 6px;
        }

        .time { 
            text-align: center; 
            color: #8b949e; 
            font-size: 11px; 
            margin-top: 16px; 
            padding: 8px;
            background: #161b22;
            border-radius: 8px;
        }
        .live { display: inline-block; width: 8px; height: 8px; background: #3fb950; border-radius: 50%; margin-right: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📊 基金日报 <span class="live"></span></div>
        <div class="actions">
            <span class="refresh" onclick="refreshData()">刷新</span>
            <span class="settings" onclick="toggleManageMode()">⚙️</span>
        </div>
    </div>
    
    <div id="add-fund-area" style="display: none; margin-bottom: 16px;">
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <input type="text" id="new-fund-code" placeholder="输入基金代码 (如 002910)" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9;">
            <button onclick="addFund(event)" style="padding: 8px 16px; border-radius: 6px; border: none; background: #238636; color: white; font-weight: 600; cursor: pointer;">添加</button>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="exportConfig()" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #58a6ff; cursor: pointer;">导出配置</button>
            <button onclick="importConfig()" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #58a6ff; cursor: pointer;">导入配置</button>
        </div>
    </div>
    
    <div id="content">
        <div class="loading">加载中...</div>
    </div>
    
    <div class="time" id="updateTime"></div>
    
    <script src="fund-estimator.js"></script>
    <script>
        const API_ENDPOINTS = [
            'https://fundcomapi.tiantianfunds.com/mm/newCore/FundValuationLast',
            'https://fundcomapi.eastmoney.com/mm/newCore/FundValuationLast'
        ];
        const API_FIELDS = 'FCODE,SHORTNAME,GSZZL,GZTIME,GSZ,NAV,PDATE';
        
        const DEFAULT_FUNDS = [
            { code: '021532', name: '天弘半导体设备指数A', share: 0 },
            { code: '011035', name: '嘉实中证稀土产业ETF联接A', share: 0 },
            { code: '017192', name: '天弘中证工业有色金属主题ETF发起联接A', share: 0 },
            { code: '008705', name: '广发高股息优享混合C', share: 0 },
            { code: '002910', name: '易方达供给改革混合', share: 0 },
            { code: '012447', name: '华夏互联网龙头混合A', share: 0 },
            { code: '110023', name: '易方达医疗保健行业混合A', share: 0 },
            { code: '005609', name: '富国军工主题混合A', share: 0 },
            { code: '000251', name: '工银金融地产混合A', share: 0 },
            { code: '009265', name: '易方达消费精选股票', share: 0 },
            { code: '001856', name: '易方达环保主题混合A', share: 0 },
            { code: '007099', name: '安信尊享添益债券C', share: 0 },
            { code: '012920', name: '易方达全球成长精选混合(QDII)人民币A', share: 0 },
            { code: '025209', name: '永赢先锋半导体智选混合发起C', share: 0 }
        ];

        let FUNDS = JSON.parse(localStorage.getItem('my_funds')) || DEFAULT_FUNDS;
        // Migrate old data (add share field if missing)
        FUNDS = FUNDS.map(f => ({ share: 0, ...f }));
        
        let isManageMode = false;

        let isRefreshing = false;

        function finiteNumber(value) {
            if (value === null || value === undefined || value === '') return null;
            const number = Number(value);
            return Number.isFinite(number) ? number : null;
        }

        function trendDirection(value) {
            if (!Number.isFinite(value)) return 0;
            const displayedValue = Math.round(value * 100) / 100;
            return displayedValue > 0 ? 1 : displayedValue < 0 ? -1 : 0;
        }
        
        function normalizeFundData(item) {
            return {
                fundcode: String(item.FCODE),
                name: item.SHORTNAME,
                gsz: item.GSZ,
                gszzl: item.GSZZL,
                dwjz: item.NAV,
                gztime: item.GZTIME,
                jzrq: item.PDATE
            };
        }
                
        async function fetchFunds(codes) {
            let lastError;

            for (const endpoint of API_ENDPOINTS) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);

                try {
                    const url = new URL(endpoint);
                    url.searchParams.set('FCODES', codes.join(','));
                    url.searchParams.set('FIELDS', API_FIELDS);
                    url.searchParams.set('_', Date.now());

                    const response = await fetch(url, {
                        signal: controller.signal,
                        cache: 'no-store'
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const payload = await response.json();
                    if (!payload.success || !Array.isArray(payload.data)) {
                        throw new Error(payload.firstError || '估值接口返回异常');
                    }

                    return new Map(payload.data.map(item => {
                        const data = normalizeFundData(item);
                        return [data.fundcode, data];
                    }));
                } catch (error) {
                    lastError = error;
                } finally {
                    clearTimeout(timeout);
                }
            }

            throw lastError || new Error('估值接口不可用');
        }
        
        function saveFunds() {
            localStorage.setItem('my_funds', JSON.stringify(FUNDS));
        }

        function toggleManageMode() {
            isManageMode = !isManageMode;
            document.getElementById('add-fund-area').style.display = isManageMode ? 'block' : 'none';
            refreshData(); 
        }

        async function addFund(event) {
            const input = document.getElementById('new-fund-code');
            const code = input.value.trim();
            if (!code) return;
            
            if (FUNDS.some(f => f.code === code)) {
                alert('该基金已存在');
                input.value = '';
                return;
            }

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '查询中...';
            btn.disabled = true;

            let data = null;
            let lookupFailed = false;
            try {
                data = (await fetchFunds([code])).get(code) || null;
            } catch (error) {
                lookupFailed = true;
                console.error('Fund lookup failed:', error);
            }
            if (data) {
                FUNDS.push({ code: code, name: data.name, share: 0 });
                saveFunds();
                input.value = '';
                refreshData();
            } else if (lookupFailed) {
                alert('数据查询失败，请稍后重试');
            } else {
                alert('未找到该基金，请检查代码');
            }
            
            btn.innerText = originalText;
            btn.disabled = false;
        }

        function removeFund(code) {
            if (confirm('确定要删除这个基金吗？')) {
                FUNDS = FUNDS.filter(f => f.code !== code);
                saveFunds();
                refreshData();
            }
        }

        function editShare(code) {
            const fund = FUNDS.find(f => f.code === code);
            if (!fund) return;
            
            const newShare = prompt(`请输入 ${fund.name} (${code}) 的持有份额:`, fund.share || 0);
            if (newShare !== null) {
                const shareNum = parseFloat(newShare);
                if (!isNaN(shareNum) && shareNum >= 0) {
                    fund.share = shareNum;
                    saveFunds();
                    refreshData();
                } else {
                    alert('请输入有效的数字');
                }
            }
        }

        function copyToClipboard(text) {
            // 1. Try modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text).catch(err => {
                    console.error('Clipboard API failed:', err);
                    return fallbackCopy(text);
                });
            } else {
                return fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            return new Promise((resolve, reject) => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    
                    // Ensure element is not visible but part of DOM
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    
                    textArea.focus();
                    textArea.select();
                    
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error("execCommand failed"));
                    }
                } catch (err) {
                    reject(err);
                }
            });
        }

        function exportConfig() {
            const configStr = JSON.stringify(FUNDS);
            const base64Config = btoa(encodeURIComponent(configStr));
            
            copyToClipboard(base64Config).then(() => {
                alert('配置代码已复制到剪贴板！\n请保存好这段代码，在其他设备点击“导入配置”即可恢复。');
            }).catch(err => {
                console.error('Copy failed:', err);
                // Last resort fallback: prompt user to copy manually
                prompt('自动复制失败，请手动复制以下配置代码：', base64Config);
            });
        }

        function importConfig() {
            const base64Config = prompt('请粘贴配置代码：');
            if (!base64Config) return;

            try {
                const configStr = decodeURIComponent(atob(base64Config));
                const newFunds = JSON.parse(configStr);
                
                if (Array.isArray(newFunds)) {
                    if (confirm(`检测到 ${newFunds.length} 个基金配置，确定要覆盖当前配置吗？`)) {
                        FUNDS = newFunds;
                        saveFunds();
                        refreshData();
                        alert('导入成功！');
                    }
                } else {
                    alert('配置代码格式错误');
                }
            } catch (e) {
                alert('无效的配置代码');
            }
        }

        async function refreshData() {
            if (isRefreshing) return;

            const content = document.getElementById('content');
            if (FUNDS.length === 0) {
                content.innerHTML = '<div class="loading">暂无关注基金，请点击右上角设置添加</div>';
                document.getElementById('updateTime').innerHTML = '';
                return;
            }
            
            isRefreshing = true;

            if (!content.querySelector('.card')) {
                content.innerHTML = '<div class="loading">加载中...</div>';
            }
            
            let dataByCode = new Map();
            let requestFailed = false;
            try {
                dataByCode = await fetchFunds(FUNDS.map(fund => fund.code));
            } catch (error) {
                requestFailed = true;
                console.error('Fund refresh failed:', error);
            }

            let holdingEstimates = new Map();
            let unsupportedEstimates = new Map();
            let failedEstimates = new Map();
            let estimationFailed = false;
            if (!requestFailed && window.FundEstimator) {
                const missingFunds = FUNDS.filter(fund => {
                    const data = dataByCode.get(fund.code);
                    const directNav = finiteNumber(data?.gsz);
                    const directChange = finiteNumber(data?.gszzl);
                    return data && (directNav === null || directChange === null);
                });
                try {
                    const estimation = await window.FundEstimator.estimate(missingFunds, dataByCode);
                    holdingEstimates = estimation.estimates;
                    unsupportedEstimates = estimation.unsupported;
                    failedEstimates = estimation.failed;
                } catch (error) {
                    estimationFailed = true;
                    console.error('Holding estimate failed:', error);
                }
            }

            let namesChanged = false;
            const results = FUNDS.map(fund => {
                const data = dataByCode.get(fund.code);
                if (data) {
                    if (data.name && data.name !== fund.name) {
                        fund.name = data.name;
                        namesChanged = true;
                    }
                    
                    const estimatedNav = data.gsz !== null && data.gsz !== undefined ? Number(data.gsz) : NaN;
                    const estimatedChange = data.gszzl !== null && data.gszzl !== undefined ? Number(data.gszzl) : NaN;
                    const lastNav = data.dwjz !== null && data.dwjz !== undefined ? Number(data.dwjz) : NaN;
                    const hasDirectEstimate = Number.isFinite(estimatedNav) && Number.isFinite(estimatedChange);
                    const holdingEstimate = hasDirectEstimate ? null : holdingEstimates.get(fund.code);
                    const hasHoldingEstimate = Boolean(holdingEstimate);
                    const hasEstimate = hasDirectEstimate || hasHoldingEstimate;
                    const nav = hasDirectEstimate ? estimatedNav : hasHoldingEstimate ? holdingEstimate.nav : lastNav;
                    const change = hasDirectEstimate ? estimatedChange : hasHoldingEstimate ? holdingEstimate.change : null;
                    const profit = hasEstimate && Number.isFinite(nav) && Number.isFinite(lastNav)
                        ? (nav - lastNav) * (fund.share || 0)
                        : null;

                    return {
                        ...fund,
                        nav: Number.isFinite(nav) ? nav : null,
                        change: Number.isFinite(change) ? change : null,
                        profit,
                        hasEstimate,
                        navDate: data.jzrq,
                        estimateTime: hasDirectEstimate ? data.gztime : holdingEstimate?.estimateTime,
                        estimateSource: hasDirectEstimate ? 'direct' : hasHoldingEstimate ? 'holding' : null,
                        estimateDetails: holdingEstimate || null,
                        unavailableReason: unsupportedEstimates.get(fund.code) || failedEstimates.get(fund.code) || null,
                        status: hasDirectEstimate ? 'estimate' : hasHoldingEstimate ? 'holding' : 'official'
                    };
                }

                return {
                    ...fund,
                    nav: null,
                    change: null,
                    profit: null,
                    hasEstimate: false,
                    status: requestFailed ? 'error' : 'missing'
                };
            });

            if (namesChanged) saveFunds();
            
            results.sort((a, b) => (b.change ?? -Infinity) - (a.change ?? -Infinity));
            
            const gains = results.filter(r => r.hasEstimate && trendDirection(r.change) > 0);
            const losses = results.filter(r => r.hasEstimate && trendDirection(r.change) < 0);
            const totalProfit = results.reduce((sum, r) => sum + (r.profit || 0), 0);
            const hasHoldingReference = results.some(r => r.estimateSource === 'holding');
            
            const now = new Date();
            document.getElementById('updateTime').innerHTML = requestFailed
                ? `数据更新失败 · ${now.toLocaleTimeString()}`
                : `<span class="live"></span>数据更新: ${now.toLocaleTimeString()}`;
            
            let html = '';
            
            // Total Profit Display
            const totalClass = totalProfit > 0 ? 'up' : totalProfit < 0 ? 'down' : 'neu';
            const totalSign = totalProfit > 0 ? '+' : '';
            if (Math.abs(totalProfit) > 0.01) {
                html += `<div class="total-gain ${totalClass}">
                    <div class="total-gain-val">${totalSign}${totalProfit.toFixed(2)}</div>
                    <div class="total-gain-label">今日${hasHoldingReference ? '参考' : '预估'}总收益 (元)</div>
                </div>`;
            }

            html += `<div class="summary">
                <div class="stat up"><div class="stat-val">${gains.length}</div><div class="stat-label">上涨</div></div>
                <div class="stat down"><div class="stat-val">${losses.length}</div><div class="stat-label">下跌</div></div>
            </div>`;
            
            if (gains.length > 0 || losses.length > 0) {
                html += `<div class="leader">`;
                if (gains.length > 0) {
                    const top = gains[0];
                    html += `<div class="leader-card">
                        <div class="leader-label">▲ 领涨</div>
                        <div class="leader-name">${top.name}</div>
                        <div class="leader-change up">+${top.change.toFixed(2)}%</div>
                    </div>`;
                }
                if (losses.length > 0) {
                    const worst = losses[losses.length - 1];
                    html += `<div class="leader-card">
                            <div class="leader-label">▼ 领跌</div>
                            <div class="leader-name">${worst.name}</div>
                            <div class="leader-change down">${worst.change.toFixed(2)}%</div>
                        </div>`;
                }
                html += `</div>`;
            }
            
            results.forEach((r, i) => {
                const direction = r.hasEstimate ? trendDirection(r.change) : 0;
                const rankClass = direction > 0 ? 'up' : direction < 0 ? 'down' : 'neu';
                const changeClass = direction > 0 ? 'up' : direction < 0 ? 'down' : 'neu';
                const changeSign = direction > 0 ? '+' : '';
                const navText = r.nav !== null ? r.nav.toFixed(3) : '--';
                const changeText = r.hasEstimate
                    ? `${r.estimateSource === 'holding' ? '参考 ' : ''}${changeSign}${r.change.toFixed(2)}%`
                    : r.status === 'official' ? '暂无估值' : r.status === 'error' ? '更新失败' : '暂无数据';
                const dateText = r.status === 'official' && r.navDate ? ` · 净值 ${r.navDate}` : '';
                let estimateMeta = '';
                if (r.estimateSource === 'holding') {
                    const details = r.estimateDetails;
                    const calibration = details.calibration;
                    const errorText = calibration.samples > 0 && calibration.mae !== null
                        ? ` · 校准${calibration.samples}次 · 近期误差 ±${calibration.mae.toFixed(2)}%`
                        : ' · 待净值更新后校验';
                    const lastErrorText = details.lastCheck
                        ? ` · 上次误差 ${details.lastCheck.error >= 0 ? '+' : ''}${details.lastCheck.error.toFixed(2)}%`
                        : '';
                    estimateMeta = `<div class="estimate-meta"><span class="quality">持仓覆盖 ${details.coverage.toFixed(0)}% · ${details.confidence}信心</span>${errorText}${lastErrorText}</div>`;
                } else if (!r.hasEstimate && r.unavailableReason) {
                    estimateMeta = `<div class="estimate-meta">${r.unavailableReason}</div>`;
                } else if (!r.hasEstimate && estimationFailed && window.FundEstimator?.supportedCodes.has(r.code)) {
                    estimateMeta = '<div class="estimate-meta">持仓参考暂时不可用</div>';
                }
                
                let actionBtn = '';
                if (isManageMode) {
                     actionBtn = `
                        <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                            <div class="share-edit" onclick="editShare('${r.code}')">持仓: ${r.share || 0}</div>
                            <div class="delete-btn" onclick="removeFund('${r.code}')" style="color: #f85149; cursor: pointer; padding: 4px; font-size: 12px;">删除</div>
                        </div>`;
                }

                const profitHtml = (r.share > 0 && r.hasEstimate)
                    ? `<div class="fund-gain ${r.profit > 0 ? 'up' : r.profit < 0 ? 'down' : ''}">${r.profit > 0 ? '+' : ''}${r.profit.toFixed(2)}</div>`
                    : '';

                html += `<div class="card">
                    <div class="rank ${rankClass}">${i+1}</div>
                    <div class="info">
                        <div class="name">${r.name}</div>
                        <div class="code">${r.code}${dateText}</div>
                        ${estimateMeta}
                        ${profitHtml}
                    </div>
                    <div class="nav">${navText}</div>
                    <div class="change ${changeClass}">${changeText}</div>
                    ${actionBtn}
                </div>`;
            });
            
            content.innerHTML = html;
            isRefreshing = false;
        }
        
        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
